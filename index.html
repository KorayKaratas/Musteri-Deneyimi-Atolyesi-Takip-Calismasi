<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Müşteri Deneyimi Atölyesi</title>

<style>
:root{
--navy:#003B7A;
--light:#F7FAFC;
--line:#E5E7EB;
--text:#0F172A;
--white:#FFFFFF;
--shadow:0 10px 30px rgba(0,0,0,.08);
}

body{
font-family:Arial;
margin:0;
background:var(--light);
color:var(--text);
user-select:none;
}

.wrap{max-width:1100px;margin:auto;padding:16px;}

.card{
background:#fff;
border-radius:20px;
padding:20px;
margin-top:16px;
box-shadow:var(--shadow);
}

.hero{
background:var(--navy);
color:#fff;
padding:24px;
border-radius:24px;
}

h1{margin:0 0 10px 0}

.btn{
background:var(--navy);
color:#fff;
border:none;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
margin-top:10px;
}

.btn-outline{
border:1px solid var(--navy);
background:#fff;
color:var(--navy);
padding:10px;
border-radius:12px;
cursor:pointer;
}

.btn-outline.active{
background:var(--navy);
color:#fff;
}

.choice-row{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.topics{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:16px;
}

.topic{
border:1px solid var(--line);
border-radius:16px;
padding:16px;
}

.topic.highlight{
border:2px solid var(--navy);
}

.subtitle{
font-size:13px;
color:#64748B;
margin-bottom:10px;
}

.check{
border:1px solid var(--line);
padding:10px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.check.active{
background:#F0F6FF;
border-color:var(--navy);
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
}

.modal{
background:#fff;
padding:24px;
border-radius:16px;
max-width:600px;
width:90%;
}

.modal-text{
white-space:pre-line;
line-height:1.8;
font-size:17px;
margin-top:10px;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="wrap">

<div class="hero">
<h1>Müşteri Deneyimi Davranış Alanı</h1>
<p>
Bu alan yeni bir şey öğretmek için değil,
bildiğini hatırlatmak için hazırlandı.
</p>
<button id="crisisBtn" class="btn">Zor andayım</button>
</div>

<div class="card">
<b>Bugün daha çok ne yaşadın?</b>
<div id="choices" class="choice-row"></div>
</div>

<div id="topics" class="topics"></div>

</div>

<!-- MODAL -->
<div id="modal" class="overlay hidden">
<div class="modal">
<h3 id="modalTitle"></h3>
<div id="modalText" class="modal-text"></div>
<button onclick="closeModal()" class="btn">Kapat</button>
</div>
</div>

<script>

const topics = [
{
title:"Tetikleyiciyi fark etmek",
subtitle:"İçeride ne çalışıyor?",
remind:`Müşteri seni zorlamıyor.
Sen, onun davranışına yüklediğin anlamla zorlanıyorsun.

Aynı durum, farklı insanlarda farklı etki yaratır.
Çünkü farkı yaratan olay değil, yorumdur.

Şimdi dur ve şunu sor:
Ben şu an neyi büyütüyorum?`
},
{
title:"Olay – Yorum – Duygu – Tepki zinciri",
subtitle:"Zinciri yakala",
remind:`Olan şey olaydır.
Senin söylediğin yorumdur.
Hissettiğin duygu, yorumunun sonucudur.
Tepkin ise bu zincirin son halkasıdır.

Zinciri kırmak istiyorsan, yorumla tepkinin arasına gir.
1 saniye dur.
Şunu sor:
Bu kesin bilgi mi, benim yorumum mu?

Davranış orada değişir.`
},
{
title:"3A modeli",
subtitle:"Araya gir",
remind:`3A, olay–yorum–duygu–tepki zincirine araya girmeni sağlar.

An:
Şu an ben ne yaşıyorum?
Geriliyor muyum, hızlanıyor muyum, savunmaya mı geçiyorum?

Ayna:
Ben bu duruma ne anlam yüklüyorum?

Ayar:
Şimdi nasıl davranmayı seçiyorum?

3A kendini bastırmak için değil,
davranışı bilinçli seçmek için vardır.`
},
{
title:"Dinlemek",
subtitle:"Yavaşla",
remind:`Dinlemek cevap vermek değildir.
Dinlemek anlamaktır.

İnsan anlaşıldığını hissettiğinde gerilim düşer.

Bugün sadece şunu dene:
Önce anla, sonra konuş.`
},
{
title:"İhtiyaç",
subtitle:"Altını gör",
remind:`Müşteri ne istediğini söyler,
ama neye ihtiyaç duyduğunu her zaman net söyleyemez.

Davranışın altına bak:
Sinir → anlaşılmama
Telaş → belirsizlik
Tekrar → güven ihtiyacı

Etikete değil, ihtiyaca bak.`
},
{
title:"Kontrol hissi",
subtitle:"Yön ver",
remind:`İnsan çözümden önce kontrol ister.

Belirsizlik gerilim yaratır.

Şunu söyle:
Şu an şu aşamadayız...

Bu cümle bile ortamı değiştirir.`
},
{
title:"Hayır demek",
subtitle:"İlişkiyi koru",
remind:`Hayır demek sorun değildir.
Müşteriyi boşlukta bırakmak sorundur.

Sıra:
Anla → Sınır koy → Alternatif sun

İlişki burada korunur.`
},
{
title:"Temsil",
subtitle:"Sen kurumsun",
remind:`Sen sadece kendini değil, kurumu temsil ediyorsun.

Kullandığın dil güven üretir ya da zedeler.

Müşteri senin niyetini değil,
davranışını hatırlar.`
},
{
title:"Son izlenim",
subtitle:"Son cümle önemli",
remind:`Müşteri sürecin tamamını hatırlamaz.
Çoğu zaman son hissi hatırlar.

Son cümlen,
nasıl hatırlandığını belirler.`
}
];

const choices = [
{ id:0, label:"Zor müşteri", topics:[0,1,2]},
{ id:1, label:"Yoğunluk", topics:[0,3,4]},
{ id:2, label:"Belirsizlik", topics:[1,5]},
{ id:3, label:"İtiraz", topics:[2,6]}
];

let selected=null;
let checks={};

function renderChoices(){
const el=document.getElementById("choices");
el.innerHTML="";
choices.forEach(c=>{
const b=document.createElement("button");
b.className="btn-outline";
if(selected===c.id) b.classList.add("active");
b.innerText=c.label;
b.onclick=()=>{
selected=selected===c.id?null:c.id;
renderChoices();
renderTopics();
};
el.appendChild(b);
});
}

function renderTopics(){
const el=document.getElementById("topics");
el.innerHTML="";
const active=selected!==null ? choices.find(c=>c.id===selected).topics : [];

topics.forEach((t,i)=>{
const div=document.createElement("div");
div.className="topic"+(active.includes(i)?" highlight":"");

div.innerHTML=`
<h3>${t.title}</h3>
<div class="subtitle">${t.subtitle}</div>
<div class="check ${checks[i]?"active":""}" onclick="toggle(${i})">
${checks[i]?"✔":"○"} Bugün kullandım
</div>
<button class="btn" onclick="openModal(${i})">Bana hatırlat</button>
`;

el.appendChild(div);
});
}

function toggle(i){
checks[i]=!checks[i];
renderTopics();
}

function openModal(i){
document.getElementById("modalTitle").innerText=topics[i].title;
document.getElementById("modalText").innerText=topics[i].remind;
document.getElementById("modal").classList.remove("hidden");
}

function closeModal(){
document.getElementById("modal").classList.add("hidden");
}

document.getElementById("crisisBtn").onclick=()=>{
openModal(2);
};

renderChoices();
renderTopics();

</script>

</body>
</html>
